services:
  - type: web
    name: ashare-watchlist-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python run_backend.py --host 0.0.0.0 --port $PORT --no-reload
    envVars:
      - key: APP_DATA_DIR
        value: /tmp/ashare-watchlist-data
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: AI_BASE_URL
        value: https://api.deepseek.com
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: deepseek-v4-flash
